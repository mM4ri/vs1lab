<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="header">
        <img src="./images/location.png" class="header__image" alt="an image of a map and location">
        <h1 class="header__title">GeoTagApp</h1>
        <nav class="header__navigation">
            <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
        </nav>
    </header>

    <main class="main row">

        <!-- Tagging -->
        <section class="main__tagging tagging col-4">
            <h2>Tagging</h2>

            <form id="tag-form" action="/tagging" method="post">
                <fieldset>
                    <legend>Add a new GeoTag</legend>

                    <label for="latitude">Latitude:</label>
                    <input type="number" id="latitude" name="latitude" value="49.01379" readonly>

                    <label for="longitude">Longitude:</label>
                    <input type="number" id="longitude" name="longitude" value="8.390071" readonly>

                    

                    <label for="name">Name:</label>
                    
                    <input type="text" id="name" name="name" maxlength="10" pattern="[A-Za-z]{1,10}" required placeholder="e.g. Berlin">
                    <label for="hashtag">Hashtag:</label>
                    <input type="text" id="hashtag" name="hashtag" pattern="#[A-Za-z]{1,10}" placeholder="#tag">

                    <button type="submit">Add Tag</button>
                </fieldset>
            </form>
        </section>

        <!-- Discovery -->
        <section class="main__discovery discovery col-8">
            <h2 class="discovery__title">Discovery</h2>

            <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">
                <fieldset>
                    <legend>Search</legend>

                    <label for="search">Search term or keywords:</label>
                    <input type="text" id="search" name="searchterm" placeholder="e.g. Berlin">

                    <!-- hidden fields -->
                    <input type="hidden" name="latitude" value="49.01379">
                    <input type="hidden" name="longitude" value="8.390071">

                    <button type="submit">Search</button>
                </fieldset>
            </form>

            <div class="discovery__wrapper row">

                <div class="discovery__taglist col-4">
                    <ul class="discovery__results">
                        <li>Castle (49.01379, 8.404435) #sight</li>
                        <li>IWI (49.01379, 8.390071) #edu</li>
                    </ul>
                </div>

                <div class="discovery__map col-8">
                    <img src="./images/mapview.jpg" alt="map">
                    <span>Result map</span>
                </div>

            </div>
        </section>

    </main>

    <footer class="footer">
        <span>(c) 2021/22 HKA_IWI_VSYS</span>
    </footer>
</body>

</html>
